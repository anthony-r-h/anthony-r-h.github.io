# Site Settings
name: Local Nonsatiation
title: Local Nonsatiation
description: I make things.
tags:
  - blog
  - template
  - jekyll
  - theme
  - netlify
menu:
  - title: Home
    url: /
  - title: Project Planning
    url: /plan
  - title: About
    url: /about
  - title: Contact
    url: /contact

email: anthony.hong@gmail.com

# Footer defaults
footer_ui:
  show_menu_links: false
  show_social_links: true
  tagline: ""

# Home listing defaults
home_listing:
  include_tags: []
  exclude_tags:
    - Plan

# Home grid layout defaults
# Override per-page in front matter with:
# home_grid_min_card_width, home_grid_column_gap, home_grid_row_gap,
# home_grid_mobile_padding, home_grid_desktop_padding
home_grid:
  min_card_width: "315px"
  column_gap: "60px"
  row_gap: "100px"
  mobile_padding: "23px"
  desktop_padding: "40px"

# Reusable list page styling defaults
# Any list_view page can override these values in front matter.
list_view_ui:
  mobile_padding: "23px"
  desktop_padding: "40px"
  item_spacing: "28px"
  divider_color: "rgba(255, 255, 255, 0.2)"
  title_size: "30px"
  title_color: "#efe7de"
  title_hover_color: "#efe7de"
  meta_color: "#f2f2f2"
  description_color: "#f2f2f2"




# Social Media Settings
# Remove the item if you don't need it
github_username: 
facebook_username:
twitter_username:
instagram_username: nonsatiation
medium_username:


# Posts Settings
two_columns_layout: false

# Post page UI defaults
# Any post can override these values in front matter with `post_*` keys.
post_ui:
  content_max_width: "1080px"
  content_padding_mobile: "20px"
  content_padding_desktop: "20px"
  font_size_mobile: "17px"
  font_size_desktop: "20px"
  line_height_mobile: "30px"
  line_height_desktop: "40px"
  title_size_mobile: "36px"
  title_size_desktop: "50px"
  section_title_size_mobile: "32px"
  section_title_size_desktop: "42px"
  section_heading_space_mobile: "44px"
  section_heading_space_desktop: "52px"
  heading_body_gap_mobile: "12px"
  heading_body_gap_desktop: "14px"
  paragraph_spacing_mobile: "24px"
  paragraph_spacing_desktop: "28px"
  list_spacing_mobile: "24px"
  list_spacing_desktop: "28px"
  list_item_spacing_mobile: "10px"
  list_item_spacing_desktop: "12px"
  list_indent: "2rem"
  section_scroll_margin_mobile: "110px"
  section_scroll_margin_desktop: "130px"
  toc_spacing_mobile: "18px"
  toc_spacing_desktop: "22px"
  toc_item_spacing_mobile: "8px"
  toc_item_spacing_desktop: "10px"
  subtitle_color: "#4d4d4d"
  meta_color: "#4d4d4d"
  meta_icon_color: "#4d4d4d"
  link_hover_color: "#a9a9a9"
  tag_color: "#1c3329"
  tag_hover_bg: "#1c3329"
  tag_hover_color: "#efe7de"
  csv_table:
    page_size: 20
    max_height: "520px"
    font_size: "14px"
    chart_aspect_ratio: "16 / 9"
    chart_show_gridlines: false
    background_color: "#efe7de"
    text_color: "#333333"
    border_color: "#b7b0a8"
    header_bg: "#1c3329"
    header_color: "#efe7de"
    row_hover_bg: "#e2dbd2"
    status_color: "#4d4d4d"



# Advanced Settings


baseurl: "" # the subpath of your site, e.g. /blog
url: "" # the base hostname & protocol for your site
google_analytics: ""
language: "en"


# Build settings
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate_path: "/page/:num/"
use_logo: false

# Content paginator
paginate_content:
  enabled: true
  debug: false
  collections:
    - posts
    - etc
  auto: false
  separator: "--page-break--"
  permalink: "/:num/"
  seo_canonical: true
  properties:
    part:
      is_generated: true
    last:
      is_generated: true
    single:
      is_generated: true

# SASS
sass:
  style: compressed

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-paginate-content
  - jekyll-toc

# Exclude my node related stuff
exclude: [
  'package.json',
  'package-lock.json',
  'src',
  'node_modules',
  'vendor',
  '.bundle',
  'initpost.sh',
  'Gemfile',
  'Gemfile.lock',
  'gulpfile.js',
  'README.md'
]

# Theme
version: v3.1.2
